version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  app:
    build:
      context: .
      target: app
    ports:
      - "8501:8501"
    environment:
      - DEVICE=cpu
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local
